name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  flutter:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: level
        run: flutter pub get

      - name: Analyze
        working-directory: level
        run: flutter analyze --fatal-infos

      - name: Run unit tests
        working-directory: level
        run: flutter test test/unit/ --reporter=compact
